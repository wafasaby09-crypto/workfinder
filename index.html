<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legit Jobs Hub</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

/* Top Warning */
.warning {
    background: red;
    color: white;
    text-align: center;
    padding: 10px;
    font-weight: bold;
}

/* Header */
header {
    background: #111;
    color: white;
    padding: 15px;
    text-align: center;
}

/* Login */
.login-box {
    text-align: center;
    margin: 20px;
}

.login-box button {
    padding: 10px;
    margin: 5px;
    width: 200px;
    border: none;
    cursor: pointer;
}

.google {
    background: #4285F4;
    color: white;
}

.email {
    background: black;
    color: white;
}

/* Search */
.search {
    text-align: center;
    margin: 20px;
}

.search input {
    width: 80%;
    padding: 10px;
}

/* Jobs */
.jobs {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    padding: 20px;
}

.job {
    background: white;
    padding: 15px;
    border-radius: 10px;
}

.tag {
    padding: 5px;
    font-size: 12px;
    border-radius: 5px;
    display: inline-block;
    margin-top: 5px;
}

.free { background: green; color: white; }
.connects { background: orange; color: white; }

.apply {
    display: block;
    margin-top: 10px;
    background: black;
    color: white;
    text-align: center;
    padding: 8px;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="warning">
⚠️ We only post verified jobs. NEVER pay money via M-Pesa to get a job.
</div>

<header>
<h2>Legit Jobs Hub 🌍</h2>
</header>

<div class="login-box">
<button class="google">Login with Google</button><br>
<button class="email">Login with Email</button>
</div>

<div class="search">
<input type="text" id="searchInput" placeholder="Search jobs...">
</div>

<div class="jobs" id="jobList">

<div class="job">
<h3>Content Writer</h3>
<p>Remote | $10/article</p>
<span class="tag free">FREE</span>
<a href="#" class="apply">Apply</a>
</div>

<div class="job">
<h3>Virtual Assistant</h3>
<p>Remote | $5/hr</p>
<span class="tag connects">CONNECTS</span>
<a href="#" class="apply">Apply</a>
</div>

<div class="job">
<h3>Data Entry Clerk</h3>
<p>Remote | $4/hr</p>
<span class="tag free">FREE</span>
<a href="#" class="apply">Apply</a>
</div>

</div>

<script>
// Search Function
document.getElementById("searchInput").addEventListener("keyup", function() {
    let filter = this.value.toLowerCase();
    let jobs = document.querySelectorAll(".job");

    jobs.forEach(job => {
        let text = job.innerText.toLowerCase();
        job.style.display = text.includes(filter) ? "block" : "none";
    });
});
</script>

</body>
</html>
